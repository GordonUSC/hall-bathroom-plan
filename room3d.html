<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Your Room in 3D · The Reglaze Room</title>
<style>
  :root{--serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;--body:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;--mono:ui-monospace,"SF Mono",Menlo,monospace;--spa:#7fd4c6;--gold:#e6b877;--ink:#eef2f5}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#12161a;color:var(--ink);font-family:var(--body);overflow:hidden}
  #c{position:fixed;inset:0;display:block;touch-action:none}
  .ov{position:fixed;left:0;right:0;top:0;padding:16px 18px;pointer-events:none;z-index:5;
    background:linear-gradient(180deg,rgba(10,13,16,0.7),transparent)}
  .ov .kick{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--spa)}
  .ov h1{font-family:var(--serif);font-size:26px;margin:6px 0 2px}
  .ov .sub{font-size:13.5px;color:#c4ced6}
  .back{position:fixed;top:14px;right:14px;z-index:6;pointer-events:auto;background:rgba(15,20,24,0.85);border:1px solid rgba(238,242,245,0.22);border-radius:22px;padding:9px 15px;color:var(--ink);font:inherit;font-size:14px;text-decoration:none}
  .hint{position:fixed;left:0;right:0;bottom:20px;text-align:center;z-index:5;pointer-events:none;font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(238,242,245,0.6)}
  .tempbar{position:fixed;left:50%;transform:translateX(-50%);bottom:52px;z-index:6;display:flex;gap:8px;pointer-events:auto}
  .tempbar button{background:rgba(15,20,24,0.85);border:1px solid rgba(238,242,245,0.22);border-radius:18px;padding:8px 13px;color:#c4ced6;font-family:var(--mono);font-size:11px;letter-spacing:0.06em}
  .tempbar button.on{color:var(--gold);border-color:var(--gold)}
  .load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:8;background:#12161a;flex-direction:column;gap:14px;text-align:center;padding:24px}
  .load .r{font-family:var(--serif);font-style:italic;font-size:20px;color:#c4ced6;max-width:24ch}
  .load .s{width:44px;height:44px;border:3px solid rgba(127,212,198,0.25);border-top-color:var(--spa);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{max-width:30ch;font-size:15px;color:#c4ced6;line-height:1.5}
</style>
</head>
<body>
<div class="load" id="load"><div class="s"></div><div class="r">Building your room, to the inch...</div></div>
<canvas id="c"></canvas>
<div class="ov"><div class="kick">Walk into it</div><h1>Your room, in 3D</h1><div class="sub">Your 5 by 8, to scale. The oak floor, the floating vanity, your reglazed white tub.</div></div>
<a class="back" href="index.html">&larr; Back to studio</a>
<div class="tempbar" id="tempbar"><button data-t="warm" class="on">2700K spa</button><button data-t="neutral">3000K</button><button data-t="work">4000K work</button></div>
<div class="hint">Drag to look around &middot; pinch to zoom</div>

<script src="vendor/three.min.js"></script>
<script src="vendor/OrbitControls.js"></script>
<script>
(function(){
  var load=document.getElementById('load');
  if(!window.THREE||!THREE.WebGLRenderer){load.innerHTML='<div class="err">This device could not start 3D. Everything else in the studio still works, tap Back to studio.</div><a class="back" href="index.html" style="position:static;pointer-events:auto">Back to studio</a>';return;}
  try{ start(); }catch(e){ load.innerHTML='<div class="err">3D hiccup on this device. The full studio still works, tap Back to studio.</div><a class="back" href="index.html" style="position:static;pointer-events:auto">Back to studio</a>'; }

  function start(){
  var canvas=document.getElementById('c');
  var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.12;

  var scene=new THREE.Scene();
  // soft warm gradient backdrop
  var bg=document.createElement('canvas');bg.width=8;bg.height=256;var bx=bg.getContext('2d');
  var gr=bx.createLinearGradient(0,0,0,256);gr.addColorStop(0,'#20272e');gr.addColorStop(0.55,'#191f25');gr.addColorStop(1,'#12161a');
  bx.fillStyle=gr;bx.fillRect(0,0,8,256);
  var bgt=new THREE.CanvasTexture(bg);scene.background=bgt;

  var camera=new THREE.PerspectiveCamera(54,innerWidth/innerHeight,0.1,200);
  camera.position.set(5.2,5,6.4);
  var controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=0.08;
  controls.target.set(-0.4,2,0);
  controls.minDistance=3.5;controls.maxDistance=15;
  controls.minPolarAngle=0.25;controls.maxPolarAngle=1.52;
  controls.enablePan=false;

  // ---- textures ----
  var loader=new THREE.TextureLoader();
  function wood(file,rx,ry){var t=loader.load(file);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(rx,ry);t.encoding=THREE.sRGBEncoding;return t;}
  var floorTex=wood('assets/floor.jpg',3,3);
  var vanTex=wood('assets/oak.jpg',2,1);

  // ---- materials ----
  var mWhite=new THREE.MeshStandardMaterial({color:0xf1f4f5,roughness:0.82,metalness:0.02});
  var mWall=new THREE.MeshStandardMaterial({color:0xeef1f2,roughness:0.95,metalness:0.0});
  var mBasin=new THREE.MeshStandardMaterial({color:0xe4ebee,roughness:0.7,metalness:0.03});
  var mWood=new THREE.MeshStandardMaterial({map:vanTex,color:0xefe7db,roughness:0.72,metalness:0.05});
  var mFloor=new THREE.MeshStandardMaterial({map:floorTex,color:0xf0e6d6,roughness:0.84,metalness:0.04});
  var mChrome=new THREE.MeshStandardMaterial({color:0xdfeaf2,roughness:0.16,metalness:0.92});
  var mMirror=new THREE.MeshStandardMaterial({color:0xcde0ee,roughness:0.06,metalness:0.6});
  var mTrim=new THREE.MeshStandardMaterial({color:0xd7e4ee,roughness:0.25,metalness:0.7});
  var mBrass=new THREE.MeshStandardMaterial({color:0xc69a5a,roughness:0.3,metalness:0.85});
  // reflect Joe's choices from the studio
  var CH={};try{CH=JSON.parse(localStorage.getItem('joe_reglaze_choices_v1')||'{}');}catch(e){}
  if(CH.wall){mWall.color.set(CH.wall);}
  if(CH.floor==='stone'){mFloor=new THREE.MeshStandardMaterial({color:0xcfc9c0,roughness:0.45,metalness:0.05});}
  if(CH.mirror==='lit'){mMirror.emissive=new THREE.Color(0xffe6c2);mMirror.emissiveIntensity=0.42;}
  var mFrame=(CH.accent==='brass')?mBrass:mTrim;
  // room dimensions from Joe's planner (feet)
  var B_ft=(CH.B||96)/12, A_ft=(CH.A||72)/12, H_ft=(CH.ceil||96)/12, hx=B_ft/2, hz=A_ft/2;
  camera.position.set(hx*1.15,H_ft*0.6,hz+Math.max(3.2,B_ft*0.62));
  controls.target.set(-hx*0.08,H_ft*0.26,0);
  controls.maxDistance=Math.max(12,B_ft*2.4);
  try{document.querySelector('.ov .sub').textContent='Your '+(Math.round(B_ft*10)/10)+' by '+(Math.round(A_ft*10)/10)+' feet, to scale. Your walls, your floor, your finishes, exactly as you set them.';}catch(e){}

  function box(w,h,d,mat,x,y,z){var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.position.set(x,y,z);scene.add(m);return m;}

  // ---- room to Joe's measured size (supports rectangle or L) ----
  function polyPts(){var B=CH.B||96,A=CH.A||62,nw=CH.nw||36,nd=CH.nd||30,c=CH.ncorner||'TR';
   if(CH.shape!=='L')return [[0,0],[B,0],[B,A],[0,A]];
   if(c==='TR')return [[0,0],[B-nw,0],[B-nw,nd],[B,nd],[B,A],[0,A]];
   if(c==='TL')return [[nw,0],[B,0],[B,A],[0,A],[0,nd],[nw,nd]];
   if(c==='BR')return [[0,0],[B,0],[B,A-nd],[B-nw,A-nd],[B-nw,A],[0,A]];
   return [[0,0],[B,0],[B,A],[nw,A],[nw,A-nd],[0,A-nd]];}
  var PTS=polyPts().map(function(p){return [p[0]/12-hx, p[1]/12-hz];}); // feet, centered
  function ptIn(x,y){var B=(CH.B||96)/12,A=(CH.A||72)/12;var xx=x+hx,yy=y+hz;
   if(xx<0||yy<0||xx>B||yy>A)return false;
   if(CH.shape!=='L')return true;
   var nw=(CH.nw||36)/12,nd=(CH.nd||30)/12,c=CH.ncorner||'TR';
   var n={TL:[0,0,nw,nd],TR:[B-nw,0,nw,nd],BL:[0,A-nd,nw,nd],BR:[B-nw,A-nd,nw,nd]}[c];
   return !(xx>n[0]&&xx<n[0]+n[2]&&yy>n[1]&&yy<n[1]+n[3]);}
  var shp=new THREE.Shape(); PTS.forEach(function(p,i){ i?shp.lineTo(p[0],p[1]):shp.moveTo(p[0],p[1]); });
  var fl=new THREE.Mesh(new THREE.ShapeGeometry(shp),mFloor);
  fl.rotation.x=-Math.PI/2; fl.position.y=0; scene.add(fl);
  // walls on EVERY interior edge, single-sided facing IN: whichever side the camera
  // orbits to, the near walls cull away and the room stays open
  function edgeInfo(i){
    var a=PTS[i],b=PTS[(i+1)%PTS.length];
    var horiz=Math.abs(a[1]-b[1])<1e-6;
    var len=horiz?Math.abs(b[0]-a[0]):Math.abs(b[1]-a[1]);
    var mx=(a[0]+b[0])/2, mz=(a[1]+b[1])/2, inw;
    if(horiz) inw=ptIn(mx,mz+0.15)?{x:0,z:1}:{x:0,z:-1};
    else      inw=ptIn(mx+0.15,mz)?{x:1,z:0}:{x:-1,z:0};
    var rot=horiz?(inw.z>0?0:Math.PI):(inw.x>0?Math.PI/2:-Math.PI/2);
    return {horiz:horiz,len:len,mx:mx,mz:mz,inw:inw,rot:rot};
  }
  // two-tone walls, true to the plan: reglazed white tile wainscot to 4 ft, painted above
  var TILE_H=4;
  var mTile=new THREE.MeshStandardMaterial({color:0xf4f7f7,roughness:0.32,metalness:0.04});
  for(var i=0;i<PTS.length;i++){
    var e=edgeInfo(i); if(e.len<0.01)continue;
    var lo=new THREE.Mesh(new THREE.PlaneGeometry(e.len,TILE_H),mTile);
    lo.position.set(e.mx,TILE_H/2,e.mz); lo.rotation.y=e.rot; scene.add(lo);
    var up=new THREE.Mesh(new THREE.PlaneGeometry(e.len,H_ft-TILE_H),mWall);
    up.position.set(e.mx,TILE_H+(H_ft-TILE_H)/2,e.mz); up.rotation.y=e.rot; scene.add(up);
  }

  // ---- fixtures mount to the walls Joe placed them on in the planner ----
  // planner wall ids are 'w<N>' = Nth edge of the same floor polygon
  function edgeIndex(id){var n=parseInt(String(id||'').replace('w',''),10);return (n>=0&&n<PTS.length)?n:null;}
  function longHorizEdge(){var best=0,bl=-1;for(var i=0;i<PTS.length;i++){var e=edgeInfo(i);if(e.horiz&&e.len>bl){bl=e.len;best=i;}}return best;}
  function oppositeEdge(i){var e=edgeInfo(i),best=null,bd=-1;
    for(var j=0;j<PTS.length;j++){if(j===i)continue;var f=edgeInfo(j);
      if(f.horiz!==e.horiz)continue;var d=Math.abs(e.horiz?(f.mz-e.mz):(f.mx-e.mx));
      if(d>bd){bd=d;best=j;}}
    return best==null?i:best;}
  var tubE=edgeIndex(CH.tubWall); if(tubE==null)tubE=longHorizEdge();
  var vanE=edgeIndex(CH.vanWall); if(vanE==null)vanE=oppositeEdge(tubE);
  var toiE=edgeIndex(CH.toiletWall); if(toiE==null)toiE=vanE;
  // a group whose local -Z faces its wall, origin `depth` ft into the room, slid `slide` ft along the wall
  function wallGroup(i,depth,slide){var e=edgeInfo(i);var g=new THREE.Group();
    g.position.set(e.mx+e.inw.x*depth,0,e.mz+e.inw.z*depth);
    g.rotation.y=e.rot; if(slide)g.translateX(slide); scene.add(g); return g;}
  function lbox(g,w,h,d,mat,x,y,z){var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.position.set(x,y,z);g.add(m);return m;}

  // reglazed tub with its kept silver-frame sliding doors, on Joe's tub wall
  var tubLen=Math.min(5,edgeInfo(tubE).len-0.6);
  var gT=wallGroup(tubE,1.2,0);
  lbox(gT,tubLen,1.45,2.3,mWhite,0,0.725,0);       // apron
  lbox(gT,tubLen,0.14,2.3,mWhite,0,1.52,0);        // rim
  lbox(gT,tubLen-0.7,0.55,1.6,mBasin,0,1.35,0);    // basin recess
  // shower riser + head, tucked to the wall at one end
  lbox(gT,0.07,3.6,0.07,mChrome,-tubLen/2+0.35,3.4,-1.02);
  var shead=new THREE.Mesh(new THREE.CylinderGeometry(0.24,0.24,0.05,20),mChrome);
  shead.rotation.z=Math.PI/2.6; shead.position.set(-tubLen/2+0.55,5.25,-0.85); gT.add(shead);
  // the sliders Joe is keeping: chrome frame + two frosted panels over the rim
  var GD_Y0=1.62, GD_Y1=6.1, gdz=0.95;
  lbox(gT,tubLen,0.09,0.1,mChrome,0,GD_Y0,gdz);    // bottom track
  lbox(gT,tubLen,0.09,0.1,mChrome,0,GD_Y1,gdz);    // top track
  lbox(gT,0.08,GD_Y1-GD_Y0,0.09,mChrome,-tubLen/2+0.04,(GD_Y0+GD_Y1)/2,gdz);
  lbox(gT,0.08,GD_Y1-GD_Y0,0.09,mChrome, tubLen/2-0.04,(GD_Y0+GD_Y1)/2,gdz);
  lbox(gT,0.06,GD_Y1-GD_Y0,0.07,mChrome,0,(GD_Y0+GD_Y1)/2,gdz);   // meeting stile
  var mGlass=new THREE.MeshStandardMaterial({color:0xdfe9ec,roughness:0.55,metalness:0.05,transparent:true,opacity:0.28,depthWrite:false,side:THREE.DoubleSide});
  var g1=new THREE.Mesh(new THREE.PlaneGeometry(tubLen/2-0.12,GD_Y1-GD_Y0-0.14),mGlass);
  g1.position.set(-tubLen/4,(GD_Y0+GD_Y1)/2,gdz-0.035); gT.add(g1);
  var g2=new THREE.Mesh(new THREE.PlaneGeometry(tubLen/2-0.12,GD_Y1-GD_Y0-0.14),mGlass);
  g2.position.set(tubLen/4,(GD_Y0+GD_Y1)/2,gdz+0.035); gT.add(g2);
  // towel bar on the outer panel, like the real one
  lbox(gT,tubLen/2-0.5,0.05,0.05,mChrome,tubLen/4,3.4,gdz+0.09);
  // floating vanity + mirror + sconces, on Joe's vanity wall
  // Domani Stella, true to spec: 48.5"W x 18.75"D x 22.25"H, wall-hung, counter at 34"
  var VAN_W=48.5/12, VAN_D=18.75/12, VAN_H=22.25/12, VAN_TOP=34/12;
  var vanWlen=edgeInfo(vanE).len, vanLen=Math.min(VAN_W,vanWlen-0.5);
  var gV=wallGroup(vanE,VAN_D/2+0.02,0);
  lbox(gV,vanLen,VAN_H,VAN_D,mWood,0,VAN_TOP-VAN_H/2,0);            // cabinet, floating at true height
  lbox(gV,vanLen+0.08,0.1,VAN_D+0.06,mWhite,0,VAN_TOP+0.05,0.02);   // white cultured-marble top
  if(CH.sink==='integrated'){var isink=new THREE.Mesh(new THREE.CylinderGeometry(0.62,0.55,0.14,28),mBasin);isink.scale.z=0.62;isink.position.set(0,VAN_TOP+0.09,0.02);gV.add(isink);}
  else{var sink=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.4,0.42,28),mBasin);sink.position.set(0,VAN_TOP+0.28,0.02);gV.add(sink);}
  var fa=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.8,16),mChrome);fa.position.set(0,VAN_TOP+0.42,-0.52);gV.add(fa);
  lbox(gV,0.06,0.06,0.45,mChrome,0,VAN_TOP+0.78,-0.3);              // spout
  var mmw=Math.min(3.2,vanLen*0.85);
  var mir=new THREE.Mesh(new THREE.PlaneGeometry(mmw,3.4),mMirror);mir.position.set(0,4.7,-0.8);gV.add(mir);
  lbox(gV,mmw+0.3,3.6,0.05,mFrame,0,4.7,-0.835);   // mirror frame (brass if chosen)
  if(CH.mirror==='lit'){var halo=new THREE.PointLight(0xffe6c2,0.5,10,2);halo.position.set(0,4.7,-0.45);gV.add(halo);}
  if(CH.accent==='brass'){var hook=new THREE.Mesh(new THREE.TorusGeometry(0.2,0.045,10,24),mBrass);hook.position.set(Math.min(vanLen/2+0.6,vanWlen/2-0.3),3.1,-0.75);gV.add(hook);}
  function sconce(sx){var s=new THREE.Mesh(new THREE.SphereGeometry(0.13,18,18),new THREE.MeshStandardMaterial({color:0xfff2df,emissive:0xffcf9a,emissiveIntensity:1.2,roughness:0.4}));s.position.set(sx,5.3,-0.7);gV.add(s);
    var pl=new THREE.PointLight(0xffcf9a,0.6,14,2);pl.position.set(sx,5.3,-0.55);gV.add(pl);return s;}
  sconce(-vanLen*0.3);sconce(vanLen*0.3);

  // toilet, on its own wall, tucked to the corner clear of the vanity
  var toiWlen=edgeInfo(toiE).len;
  var tslide=toiWlen/2-0.85;
  if(toiE===vanE) tslide=Math.min(toiWlen/2-0.7, Math.max(vanLen/2+0.8, tslide));
  var gTo=wallGroup(toiE,0.6,tslide);
  lbox(gTo,1.2,1.1,1.0,mWhite,0,0.55,0);           // base/bowl block
  lbox(gTo,1.15,1.4,0.4,mWhite,0,1.6,-0.35);       // tank
  var lid=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.55,0.16,24),mWhite);lid.position.set(0,1.15,0.25);gTo.add(lid);

  // the 28" hall door, on its planner wall (or an end wall by default)
  var dooE=edgeIndex(CH.doorWall);
  if(dooE==null){var tE=edgeInfo(tubE);
    for(var j=0;j<PTS.length;j++){if(j===tubE||j===vanE)continue;
      var f=edgeInfo(j); if(f.horiz!==tE.horiz&&f.len>2.5){dooE=j;break;}}}
  if(dooE!=null){
    var DW=28/12, DH=80/12;
    var gD=wallGroup(dooE,0.035,0);
    lbox(gD,DW+0.18,DH+0.1,0.06,mWhite,0,(DH+0.1)/2,0);   // casing
    lbox(gD,DW,DH,0.06,new THREE.MeshStandardMaterial({color:0xf7f8f6,roughness:0.6,metalness:0.02}),0,DH/2,0.03); // slab
    var knob=new THREE.Mesh(new THREE.SphereGeometry(0.07,14,14),mChrome);knob.position.set(DW/2-0.22,3.0,0.11);gD.add(knob);
  }

  // frame the room from across the vanity wall, so the mirror and cabinet face the camera
  (function(){var e=edgeInfo(vanE);var span=e.horiz?A_ft:B_ft;
    var d=span*1.15+3.2;
    camera.position.set(e.mx+e.inw.x*d+(e.horiz?B_ft*0.22:0), H_ft*0.62, e.mz+e.inw.z*d+(e.horiz?0:A_ft*0.22));
    controls.target.set(e.mx*0.35, H_ft*0.28, e.mz*0.35);
  })();

  // ---- lighting (2700K warm base) ----
  var hemi=new THREE.HemisphereLight(0xfff2e0,0x2b2622,0.55);scene.add(hemi);
  var key=new THREE.DirectionalLight(0xffe0b8,0.55);key.position.set(4,9,6);scene.add(key);
  var fill=new THREE.PointLight(0xffd9ad,0.5,26,2);fill.position.set(0,6.5,2);scene.add(fill);
  var warmVeil=new THREE.PointLight(0xffb46e,0.35,30,2);warmVeil.position.set(-1,4,3);scene.add(warmVeil);

  // temperature presets
  var TEMPS={warm:{hemi:0xfff2e0,key:0xffe0b8,amb:0.55,veil:0.35,bg:'#20272e'},
             neutral:{hemi:0xfdf6ee,key:0xfff0dd,amb:0.62,veil:0.18,bg:'#222a30'},
             work:{hemi:0xeef4ff,key:0xffffff,amb:0.75,veil:0.05,bg:'#232c34'}};
  function setTemp(t){var p=TEMPS[t];hemi.color.setHex(p.hemi);hemi.intensity=p.amb;key.color.setHex(p.key);warmVeil.intensity=p.veil;
    gr=bx.createLinearGradient(0,0,0,256);gr.addColorStop(0,p.bg);gr.addColorStop(1,'#12161a');bx.fillStyle=gr;bx.fillRect(0,0,8,256);bgt.needsUpdate=true;}
  document.getElementById('tempbar').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;
    [].forEach.call(this.querySelectorAll('button'),function(x){x.classList.remove('on');});b.classList.add('on');setTemp(b.dataset.t);});

  // reveal (fade out loader once first frame drawn)
  var started=false;
  function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
  window.addEventListener('resize',onResize);
  function tick(){controls.update();renderer.render(scene,camera);
    if(!started){started=true;load.style.transition='opacity .6s';load.style.opacity='0';setTimeout(function(){load.style.display='none';},650);}
    requestAnimationFrame(tick);}
  tick();
  }
})();
</script>
</body></html>
